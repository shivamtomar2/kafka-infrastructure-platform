---
- name: Create Kafka directory
  file:
    path: /opt/kafka
    state: directory
    mode: '0755'

- name: Download Kafka
  get_url:
    url: https://archive.apache.org/dist/kafka/3.7.1/kafka_2.13-3.7.1.tgz
    dest: /tmp/kafka.tgz
    mode: '0644'

- name: Extract Kafka
  unarchive:
    src: /tmp/kafka.tgz
    dest: /opt/kafka
    remote_src: yes
    extra_opts:
      - --strip-components=1

- name: Deploy Kafka KRaft Configuration
  template:
    src: server.properties.j2
    dest: /opt/kafka/config/kraft/server.properties
    mode: '0644'

- name: Create Kafka Data Directory
  file:
    path: /tmp/kraft-combined-logs
    state: directory
    mode: '0755'

- name: Format Kafka Storage
  shell: |
    /opt/kafka/bin/kafka-storage.sh format \
    -t LpJFO8ZTRe6yI4NvteWRkQ \
    -c /opt/kafka/config/kraft/server.properties
  ignore_errors: true

- name: Stop Existing Kafka Process
  shell: |
    pkill -f kafka.Kafka || true
  ignore_errors: true

- name: Start Kafka Server
  shell: |
    export KAFKA_HEAP_OPTS="-Xms128M -Xmx256M"
    nohup /opt/kafka/bin/kafka-server-start.sh \
    /opt/kafka/config/kraft/server.properties \
    > /tmp/kafka.log 2>&1 &
  args:
    executable: /bin/bash

- name: Wait for Kafka Startup
  pause:
    seconds: 30

- name: Verify Kafka Process
  shell: jps
  register: kafka_process

- name: Display Kafka Process
  debug:
    var: kafka_process.stdout_lines

- name: Verify Kafka Installation
  command: /opt/kafka/bin/kafka-topics.sh --version
  register: kafka_version
  changed_when: false

- name: Display Kafka Version
  debug:
    var: kafka_version.stdout_lines
